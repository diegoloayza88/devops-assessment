apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-service.fullname" . }}
  labels:
    {{- include "vllm-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vllm-service.selectorLabels" . | nindent 6 }}
  # Recreate is safer for stateful LLM pods sharing a PVC
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vllm-service.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vllm-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.model.useVllmArgs }}
          args:
            - "--model"
            - {{ .Values.model.name | quote }}
            - "--device"
            - {{ .Values.model.device | quote }}
            - "--dtype"
            - {{ .Values.model.dtype | quote }}
            - "--max-model-len"
            - {{ .Values.model.maxModelLen | quote }}
            {{- if eq .Values.model.device "cuda" }}
            - "--gpu-memory-utilization"
            - {{ .Values.model.gpuMemoryUtilization | quote }}
            {{- end }}
            - "--enforce-eager"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HF_HOME
              value: {{ .Values.persistence.mountPath }}
            {{- if .Values.model.hfToken }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vllm-service.fullname" . }}-hf-token
                  key: token
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: model-cache
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "vllm-service.fullname" . }}-model-cache
        {{- end }}
